<!DOCTYPE html>
<html>
<head>
    <title>Centered Vertical Blocks</title>
    <style>
        /* Define a container for the horizontal blocks */
        .container {
            display: flex; /* Use flexbox to arrange items horizontally */
            flex-direction: column; /* Arrange items in a column (vertically) */
            justify-content: center; /* Center vertically */
            align-items: center; /* Center horizontally */
            height: 100vh; /* Set the container height to 100% of the viewport height */
        }

        /* Style for the individual blocks */
        .horizontal-block {
            background-color: #3498db;
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 10px; /* Add margin to the bottom of each block */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="horizontal-block">
            <h1>Block 1</h1>
            <p>This is the first horizontal block.</p>
        </div>
        <div class="horizontal-block">
            <h1>Block 2</h1>
            <p>This is the second horizontal block.</p>
        </div>
        <div class="horizontal-block">
            <h1>Block 3</h1>
            <p>This is the third horizontal block.</p>
        </div>
    </div>
</body>
</html>
